# ==============================================================================
# EXHAUSTIVE THEME: OBSIDIAN LABORATORY
# Designed for high-density, high-agency orbital layouts.
# ==============================================================================

[themes.ObsidianLaboratory]

  # ----------------------------------------------------------------------------
  # STYLE PROPERTIES
  # ----------------------------------------------------------------------------
  [themes.ObsidianLaboratory.style]
  
  # Booleans
  AntiAliasedLines = true
  AntiAliasedFill = true
  AntiAliasedLinesUseTex = true

  # Floats (Scalars)
  Alpha = 1.0
  DisabledAlpha = 0.5
  
  # Geometry: The "No-Line" Rule
  WindowBorderSize = 0.0
  ChildBorderSize = 0.0
  FrameBorderSize = 0.0
  PopupBorderSize = 0.0
  TabBorderSize = 0.0
  TabBarBorderSize = 0.0
  SeparatorTextBorderSize = 0.0
  DockingSeparatorSize = 0.0

  # Geometry: The Pods (Roundedness 'md' / Pill-shaped knobs)
  WindowRounding = 6.0
  ChildRounding = 6.0
  FrameRounding = 6.0
  PopupRounding = 6.0
  TabRounding = 6.0
  ScrollbarRounding = 12.0
  GrabRounding = 12.0
  
  # Sizing & Behavior
  IndentSpacing = 16.0
  ColumnsMinSpacing = 6.0
  ScrollbarSize = 14.0
  GrabMinSize = 12.0
  LogSliderDeadzone = 4.0
  MouseCursorScale = 1.0
  CurveTessellationTol = 1.25
  CircleTessellationMaxError = 0.30
  HoverStationaryDelay = 0.15
  HoverDelayShort = 0.15
  HoverDelayNormal = 0.40

  # Vectors (ImVec2)
  WindowPadding = [16.0, 16.0]
  WindowMinSize = [32.0, 32.0]
  WindowTitleAlign = [0.0, 0.5]
  FramePadding = [8.0, 4.0]
  ItemSpacing = [8.0, 8.0]
  ItemInnerSpacing = [4.0, 4.0]
  CellPadding = [4.0, 2.0]
  TouchExtraPadding = [0.0, 0.0]
  ButtonTextAlign = [0.5, 0.5]
  SelectableTextAlign = [0.0, 0.0]
  SeparatorTextAlign = [0.0, 0.5]
  SeparatorTextPadding = [20.0, 2.0]
  DisplayWindowPadding = [16.0, 16.0]
  DisplaySafeAreaPadding = [4.0, 4.0]

  # Directions
  WindowMenuButtonPosition = "left"
  ColorButtonPosition = "right"

  # Flags
  TreeLinesFlags = ["drawlinesnone"]
  HoverFlagsForTooltipMouse = ["stationary", "delaynormal"]
  HoverFlagsForTooltipNav = ["delaynormal"]

  # ----------------------------------------------------------------------------
  # COLORS
  # ----------------------------------------------------------------------------
  [themes.ObsidianLaboratory.colors]
  
  # General Surfaces
  text = "#E5E2E1"
  textdisabled = "#C7C4D7"
  windowbg = "#131313"
  childbg = "#1B1B1C"
  popupbg = "#202020"
  border = "#FFFFFF26"       # Ghost Border (15% outline_variant)
  bordershadow = "#0A0A0A"

  # Frames & Inputs (Recessed/Extruded)
